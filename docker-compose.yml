version: '3.8'

services:
  app:
    build: .
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.decompritas.entrypoints=websecure"
      - "traefik.http.routers.decompritas.rule=Host(`decompritascr.com`) || Host(`www.decompritascr.com`)"
      - "traefik.http.routers.decompritas.tls.certresolver=letsencrypt"
      - "traefik.http.services.decompritas.loadbalancer.server.port=3000"
      # HTTP to HTTPS redirect
      - "traefik.http.routers.decompritas-redirect.entrypoints=web"
      - "traefik.http.routers.decompritas-redirect.rule=Host(`decompritascr.com`) || Host(`www.decompritascr.com`)"
      - "traefik.http.routers.decompritas-redirect.middlewares=decompritas-redirect"
      - "traefik.http.middlewares.decompritas-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.decompritas-redirect.redirectscheme.permanent=true"
    networks:
      - deploy_web

networks:
  deploy_web:
    external: true