version: '3.8'

services:
  app:
    build: .
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CRON_SECRET=${CRON_SECRET}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.decompritas.entrypoints=web,websecure"
      - "traefik.http.routers.decompritas.rule=Host(`decompritas.com`) || Host(`www.decompritas.com`)"
      - "traefik.http.routers.decompritas.tls.certresolver=letsencrypt"
      - "traefik.http.services.decompritas.loadbalancer.server.port=3000"
    networks:
      - deploy_web

networks:
  deploy_web:
    external: true